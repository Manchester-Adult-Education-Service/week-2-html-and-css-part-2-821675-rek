<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Registration Portal</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main>
        <h1>Customer Registration Portal</h1>

        <form>
            <div class="form-group">
                <label for="full-name">Full Name</label>
                <input id="full-name" type="text" required placeholder="e.g. Santa Claus">
                <small class="error-message">Full name is required.</small>
            </div>
            
            <div class="form-group">
                <label for="email-address">Email Address</label>
                <input id="email-address" type="email" required placeholder="e.g. santaclaus@gmail.com">
                <small class="error-message">Enter a valid email address.</small>
            </div>
        
            <div class="form-group">
                <label for="password">Password</label>
                <input 
                id="password"
                type="password"
                minlength="8"
                pattern="(?=.*[a-z])(?=.*[A-Z])(?=.*\d).{8,}"
                required 
                placeholder="Min 8 chars, 1 uppercase, 1 number"
                >
                <small class="error-message">Password must include uppercase, lowercase, and a number.</small>

                <ul id="password-checklist">
                    <li id="check-length">At least 8 characters</li>
                    <li id="check-lowercase">One lowercase letter</li>
                    <li id="check-uppercase">One uppercase letter</li>
                    <li id="check-number">One number</li>
                </ul>
            </div>

            <button type="submit">Create Account</button>
    
            <div id="success-message">
                Hooray! Your account has been successfully created!
            </div>
        </form>

    </main>
    <script>
        const form = document.querySelector("form");
        const successMessage = document.getElementById("success-message");
        const password = document.getElementById("password");
        const checkLength = document.getElementById("check-length")
        const checkLowercase = document.getElementById("check-lowercase")
        const checkUppercase = document.getElementById("check-uppercase")
        const checkNumber = document.getElementById("check-number")

        function updateCheck(element, isValid) {
            element.classList.toggle(valid, isValid);
        }
        password.addEventListener("invalid", function () {
            password.setCustomValidity(
                "Password must be at least 8 characters, include a capital letter and a number."
            );
        });

            password.addEventListener("input", function () {
                password.setCustomValidity("");

                const value= password.value;
                updateCheck(checkLength, value.length >= 8);
                updateCheck(checkLowercase, /[a-z]/.test(value));
                updateCheck(checkUppercase, /[A-Z]/.test(value));
                updateCheck(checkNumber, /\d/.test(value));
        });

        form.addEventListener("submit", function (event) {
            event.preventDefault(); // this prevents the page from refreshing
            if (form.checkValidity()) {
                successMessage.classList.add("show");
                form.reset();

                setTimeout(function() {
                    successMessage.classList.remove("show");
                }, 3000);
            }
        });
    </script>
</body>
</html>
