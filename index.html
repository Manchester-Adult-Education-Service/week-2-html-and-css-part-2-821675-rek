<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Registration Portal</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main>
        <h1>Customer Registration Portal</h1>

        <form>
            <div class="form-group">
                <label for="full-name">Full Name</label>
                <input 
                    id="full-name" type="text" required placeholder="e.g. Santa Claus">
            </div>
            
            <div class="form-group">
                <label for="email-address">Email Address</label>
                <input id="email-address" type="email" required placeholder="e.g. Santaclaus@gmail.com">
            </div>
        
            <div class="form-group">
                <label for="password">Password</label>
                <input id="password" minlength="8" type="password" required placeholder="Minimum 8 characters"> 
            </div>

            <button type="submit">Create Account</button>
    
            <div id="success-message">
                Hooray! Your account has been successfully created!
            </div>
        </form>

    </main>
</body>
</html>
